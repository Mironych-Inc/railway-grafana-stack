global:
  scrape_interval: 15s
  evaluation_interval: 15s

# No scrape jobs needed — the app pushes metrics via OTLP.
# The Prometheus OTLP receiver is enabled via the
# --enable-feature=otlp-write-receiver startup flag in docker-compose.yml.
scrape_configs: []

